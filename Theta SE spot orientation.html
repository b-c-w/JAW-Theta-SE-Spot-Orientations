<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beta & Alpha Visualizer</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 20px;
    background: #1a1a1a;
    color: #e0e0e0;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 300;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin-bottom: 24px;
    padding: 16px;
    background: #2a2a2a;
    border-radius: 8px;
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 140px;
  }

  .control-group label {
    font-size: 13px;
    margin-bottom: 6px;
    color: #b0b0b0;
  }

  .control-group input {
    width: 120px;
    padding: 4px 6px;
    background: #1a1a1a;
    color: #e0e0e0;
    border: 1px solid #444;
    border-radius: 4px;
    font-family: "SF Mono", Monaco, monospace;
    font-size: 12px;
  }

  .plots {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    align-items: flex-start;
    max-width: 1600px;
    margin: 0 auto;
  }

  .plot-group {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    align-items: flex-start;
  }

  .plot-container {
    background: #2a2a2a;
    padding: 16px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .plot-title {
    font-size: 14px;
    margin-bottom: 12px;
    color: #d0d0d0;
    font-weight: 500;
  }

  canvas {
    background: #1a1a1a;
    border-radius: 8px;
    border: 1px solid #333;
    display: block;
  }

  .beta-wrapper {
    position: relative;
    display: inline-block;
  }

  #betaMagnifier {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    border: 2px solid #aac4ff;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    background: #1a1a1a;
    display: none;
    overflow: hidden;
  }

  #magReadout {
    position: absolute;
    pointer-events: none;
    background: rgba(20,20,20,0.92);
    color: #e0e0e0;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 6px 8px;
    font-family: "SF Mono", Monaco, monospace;
    font-size: 11px;
    line-height: 1.5;
    white-space: nowrap;
    display: none;
  }

  .reference-img {
    max-height: 540px;
    width: auto;
    background: #000;
    border-radius: 8px;
    border: 1px solid #333;
    display: block;
  }

  .table-container {
    max-width: 1100px;
    margin: 24px auto 0;
    padding: 16px;
    background: #2a2a2a;
    border-radius: 8px;
    max-height: 400px;
    overflow-y: auto;
  }

  #pointsTable {
    width: 100%;
    border-collapse: collapse;
    font-family: "SF Mono", Monaco, monospace;
    font-size: 12px;
    color: #e0e0e0;
  }

  #pointsTable thead th {
    position: sticky;
    top: 0;
    background: #333;
    color: #aac4ff;
    padding: 8px 12px;
    text-align: right;
    border-bottom: 1px solid #555;
    font-weight: 500;
  }

  #pointsTable tbody td {
    padding: 4px 12px;
    text-align: right;
    border-bottom: 1px solid #3a3a3a;
  }

  #pointsTable tbody tr.invalid {
    color: #dc3c3c;
  }

  #pointsTable tbody tr:hover {
    background: #333;
  }
</style>
</head>
<body>

<h1>Spot Orientation Visualizer for the J.A. Woolaam Theta Ellipsometer</h1>

<div class="controls">
  <div class="control-group"><label>Pivot X Dimension A (mm)</label><input type="number" id="inA" value="138" step="1"></div>
  <div class="control-group"><label>Pivot Y Dimension B (mm)</label><input type="number" id="inB" value="43" step="1"></div>
  <div class="control-group"><label>Grid Spacing (mm)</label><input type="number" id="inGrid" value="6" step="1" min="1"></div>
  <div class="control-group"><label>Radius Boundary (mm)</label><input type="number" id="inRadius" value="150" step="1" min="1"></div>
  <div class="control-group"><label>Ellipse Long Axis (mm)</label><input type="number" id="inEA" value="3.5" step="0.5" min="0.5"></div>
  <div class="control-group"><label>Ellipse Short Axis (mm)</label><input type="number" id="inEB" value="1" step="0.5" min="0.5"></div>
</div>

<div class="table-container">
  <table id="pointsTable">
    <thead>
      <tr>
        <th>x (mm)</th>
        <th>y (mm)</th>
        <th>R (mm)</th>
        <th>θ (deg)</th>
        <th>α1 (deg)</th>
        <th>α2 (deg)</th>
        <th>α (deg)</th>
        <th>β (deg)</th>
        <th>A (mm)</th>
        <th>C (mm)</th>
        <th>B (mm)</th>
        <th>D (mm)</th>
      </tr>
    </thead>
    <tbody></tbody>

<script>
const $ = id => document.getElementById(id);
const v = id => parseFloat($(id).value);
const RAD2DEG = 180 / Math.PI;

const betaCanvas = $('betaCanvas');
const bc = betaCanvas.getContext('2d');
const alphaCanvas = $('alphaCanvas');
const ac = alphaCanvas.getContext('2d');

const magnifier = $('betaMagnifier');
const magCanvas = $('magCanvas');
const mc = magCanvas.getContext('2d');
const magReadout = $('magReadout');

// --- Magnifier configuration ---
const MAG_DIAMETER = 140;   // lens size in CSS px
const MAG_ZOOM = 5;
const MAG_OFFSET = 20;      // px offset from cursor
magnifier.style.width = MAG_DIAMETER + 'px';
magnifier.style.height = MAG_DIAMETER + 'px';
magCanvas.width = MAG_DIAMETER;
magCanvas.height = MAG_DIAMETER;

// --- Per spec ---
//   D  = √(A² + B²),  C = D
//   α1 = atan2(B, A)
//   α2 = arccos(R / (2·D))   (since C = D)
//   α  = α1 + α2,   θ = atan2(y, x),   β = θ − α
// At R = 0: θ, α1, α2, α, β all reported as 0 (not flagged invalid).
function computeAngles(x, y, A, B) {
  const R = Math.sqrt(x * x + y * y);
  const D = Math.sqrt(A * A + B * B);
  const C = D;
  const out = { R, D, C, theta: null, alpha1: null, alpha2: null, alpha: null, beta: null, invalid: false };

  if (R < 1e-9) {
    out.theta = 0; out.alpha1 = 0; out.alpha2 = 0; out.alpha = 0; out.beta = 0;
    return out;
  }
  if (D < 1e-9) { out.invalid = true; return out; }

  out.theta = Math.atan2(y, x);
  out.alpha1 = Math.atan2(B, A);

  const cosArg = R / (2 * D);
  if (cosArg < -1 || cosArg > 1) { out.invalid = true; return out; }

  out.alpha2 = Math.acos(cosArg);
  out.alpha = out.alpha1 + out.alpha2;
  out.beta = out.theta - out.alpha;
  return out;
}

// "Nice" tick step (1, 2, or 5 × 10ⁿ) targeting ~7 ticks across the span
function makeTicks(maxR) {
  const target = 7;
  const rough = (2 * maxR) / target;
  const pow = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / pow;
  let step;
  if (norm < 1.5) step = 1 * pow;
  else if (norm < 3.5) step = 2 * pow;
  else if (norm < 7.5) step = 5 * pow;
  else step = 10 * pow;
  const ticks = [];
  const first = Math.ceil(-maxR / step) * step;
  for (let t = first; t <= maxR + 1e-9; t += step) {
    ticks.push(Math.round(t * 1e6) / 1e6);
  }
  return ticks;
}

// --- Shared β-field rendering routine ---
// Renders into the supplied context using the supplied world→pixel mapping.
// Used both by the main canvas (full plot with axes) and the magnifier
// (re-rendered at MAG_ZOOM so ellipses stay crisp).
function renderBetaField(ctx, params) {
  const { A, B, grid, maxR, eA, eB, wx, wy, ppm, drawAxesAndCircle, plotRect } = params;

  if (drawAxesAndCircle) {
    ctx.strokeStyle = 'rgba(170,196,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.arc(wx(0), wy(0), maxR * ppm, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  const eaP = eA / 2 * ppm;
  const ebP = eB / 2 * ppm;

  // Iterate the same grid the main plot uses, regardless of view bounds.
  for (let gx = -maxR; gx <= maxR + 1e-9; gx += grid) {
    for (let gy = -maxR; gy <= maxR + 1e-9; gy += grid) {
      if (gx * gx + gy * gy > maxR * maxR) continue;

      // Cull anything well outside the visible plot rect for speed
      const px = wx(gx), py = wy(gy);
      if (plotRect) {
        const margin = Math.max(eaP, ebP) + 4;
        if (px < plotRect.x - margin || px > plotRect.x + plotRect.w + margin ||
            py < plotRect.y - margin || py > plotRect.y + plotRect.h + margin) continue;
      }

      const r = computeAngles(gx, gy, A, B);
      const beta = r.invalid ? 0 : r.beta;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(-beta);
      ctx.beginPath();
      ctx.ellipse(0, 0, eaP, ebP, 0, 0, Math.PI * 2);
      ctx.fillStyle = r.invalid ? 'rgba(220,60,60,0.9)' : 'rgba(255,191,0,0.9)';
      ctx.fill();
      ctx.restore();
    }
  }
}

// Stash the current β-plot mapping so the magnifier can mirror it
let betaView = null;

function drawBeta() {
  const A = v('inA'), B = v('inB');
  const grid = v('inGrid'), maxR = v('inRadius');
  const eA = v('inEA'), eB = v('inEB');
  const W = betaCanvas.width, H = betaCanvas.height;
  const PAD = { t: 30, r: 30, b: 50, l: 55 };
  const pw = W - PAD.l - PAD.r, ph = H - PAD.t - PAD.b;
  const wMin = -maxR, wMax = maxR, wSpan = 2 * maxR;
  const ppm = pw / wSpan;
  const wx = x => PAD.l + (x - wMin) / wSpan * pw;
  const wy = y => PAD.t + (wMax - y) / wSpan * ph;

  bc.clearRect(0, 0, W, H);

  // Axes
  bc.strokeStyle = '#555'; bc.lineWidth = 1;
  bc.beginPath(); bc.moveTo(PAD.l, wy(0)); bc.lineTo(PAD.l + pw, wy(0)); bc.stroke();
  bc.beginPath(); bc.moveTo(wx(0), PAD.t); bc.lineTo(wx(0), PAD.t + ph); bc.stroke();

  // Tick marks + labels (auto-scaled)
  const ticks = makeTicks(maxR);
  bc.strokeStyle = '#666'; bc.fillStyle = '#888'; bc.font = '11px Segoe UI';
  bc.textAlign = 'center'; bc.textBaseline = 'top';
  ticks.forEach(t => {
    const px = wx(t), py = PAD.t + ph;
    bc.beginPath(); bc.moveTo(px, py); bc.lineTo(px, py + 5); bc.stroke();
    bc.fillText(t, px, py + 7);
  });
  bc.textAlign = 'right'; bc.textBaseline = 'middle';
  ticks.forEach(t => {
    const px = PAD.l, py = wy(t);
    bc.beginPath(); bc.moveTo(px - 5, py); bc.lineTo(px, py); bc.stroke();
    bc.fillText(t, px - 7, py);
  });

  // Axis labels
  bc.fillStyle = '#aac4ff'; bc.font = '12px Segoe UI';
  bc.textAlign = 'center'; bc.textBaseline = 'bottom';
  bc.fillText('x (mm)', PAD.l + pw / 2, H - 2);
  bc.save();
  bc.translate(13, PAD.t + ph / 2);
  bc.rotate(-Math.PI / 2);
  bc.textBaseline = 'top';
  bc.fillText('y (mm)', 0, 0);
  bc.restore();

  // Field
  bc.save();
  bc.beginPath(); bc.rect(PAD.l, PAD.t, pw, ph); bc.clip();
  renderBetaField(bc, {
    A, B, grid, maxR, eA, eB, wx, wy, ppm,
    drawAxesAndCircle: true,
    plotRect: { x: PAD.l, y: PAD.t, w: pw, h: ph }
  });
  bc.restore();

  // Save mapping for magnifier
  betaView = { A, B, grid, maxR, eA, eB, ppm, PAD, pw, ph, W, H, wx, wy, wMin, wMax, wSpan };
}

function drawAlpha() {
  const A = v('inA'), B = v('inB');
  const maxR = v('inRadius');
  const W = alphaCanvas.width, H = alphaCanvas.height;
  const PAD = { t: 30, r: 30, b: 50, l: 65 };
  const pw = W - PAD.l - PAD.r, ph = H - PAD.t - PAD.b;

  ac.clearRect(0, 0, W, H);

  const D = Math.sqrt(A * A + B * B);
  const alpha1Deg = Math.atan2(B, A) * RAD2DEG;

  const N = 600;
  const pts = [];
  for (let i = 0; i <= N; i++) {
    const R = (i / N) * maxR;
    if (D < 1e-9) { pts.push({ R, alpha: null }); continue; }
    const cosArg = R / (2 * D);
    if (cosArg < -1 || cosArg > 1) { pts.push({ R, alpha: null }); continue; }
    pts.push({ R, alpha: alpha1Deg + Math.acos(cosArg) * RAD2DEG });
  }

  const aMin = 0, aMax = 240;
  const rx = R => PAD.l + (R / maxR) * pw;
  const ay = a => PAD.t + (aMax - a) / (aMax - aMin) * ph;

  ac.strokeStyle = '#555'; ac.lineWidth = 1;
  ac.beginPath(); ac.moveTo(PAD.l, PAD.t); ac.lineTo(PAD.l, PAD.t + ph); ac.stroke();
  ac.beginPath(); ac.moveTo(PAD.l, PAD.t + ph); ac.lineTo(PAD.l + pw, PAD.t + ph); ac.stroke();

  ac.strokeStyle = '#666'; ac.fillStyle = '#888'; ac.font = '11px Segoe UI';
  ac.textAlign = 'center'; ac.textBaseline = 'top';
  const rN = 6;
  for (let i = 0; i <= rN; i++) {
    const R = (i / rN) * maxR;
    const px = rx(R), py = PAD.t + ph;
    ac.beginPath(); ac.moveTo(px, py); ac.lineTo(px, py + 5); ac.stroke();
    ac.fillText(Math.round(R), px, py + 7);
  }

  ac.textAlign = 'right'; ac.textBaseline = 'middle';
  const aN = 8;
  for (let i = 0; i <= aN; i++) {
    const a = aMin + (i / aN) * (aMax - aMin);
    const px = PAD.l, py = ay(a);
    ac.beginPath(); ac.moveTo(px - 5, py); ac.lineTo(px, py); ac.stroke();
    ac.fillText(a.toFixed(0) + '°', px - 7, py);
  }

  ac.fillStyle = '#aac4ff'; ac.font = '12px Segoe UI';
  ac.textAlign = 'center'; ac.textBaseline = 'bottom';
  ac.fillText('R (mm)', PAD.l + pw / 2, H - 2);
  ac.save();
  ac.translate(15, PAD.t + ph / 2);
  ac.rotate(-Math.PI / 2);
  ac.textBaseline = 'top';
  ac.fillText('α (deg)', 0, 0);
  ac.restore();

  ac.save();
  ac.beginPath(); ac.rect(PAD.l, PAD.t, pw, ph); ac.clip();
  ac.strokeStyle = '#ffbf00';
  ac.lineWidth = 2;
  ac.beginPath();
  let penDown = false;
  pts.forEach(p => {
    if (p.alpha === null) { penDown = false; return; }
    const px = rx(p.R), py = ay(p.alpha);
    if (!penDown) { ac.moveTo(px, py); penDown = true; }
    else ac.lineTo(px, py);
  });
  ac.stroke();
  ac.restore();
}

function buildTable() {
  const A = v('inA'), B = v('inB');
  const grid = v('inGrid'), maxR = v('inRadius');
  const wMin = -maxR, wMax = maxR;

  const rows = [];
  for (let gx = wMin; gx <= wMax + 1e-9; gx += grid) {
    for (let gy = wMin; gy <= wMax + 1e-9; gy += grid) {
      if (gx * gx + gy * gy > maxR * maxR) continue;
      const r = computeAngles(gx, gy, A, B);
      rows.push({
        x: gx, y: gy,
        R: r.R,
        theta: r.theta === null ? null : r.theta * RAD2DEG,
        alpha1: r.alpha1 === null ? null : r.alpha1 * RAD2DEG,
        alpha2: r.alpha2 === null ? null : r.alpha2 * RAD2DEG,
        alpha: r.alpha === null ? null : r.alpha * RAD2DEG,
        beta: r.beta === null ? null : r.beta * RAD2DEG,
        invalid: r.invalid,
        A, C: r.C, B, D: r.D
      });
    }
  }

  const tbody = document.querySelector('#pointsTable tbody');
  const fmt = (val, d = 2) => val === null || isNaN(val) ? '—' : val.toFixed(d);
  tbody.innerHTML = rows.map(r => `
    <tr class="${r.invalid ? 'invalid' : ''}">
      <td>${fmt(r.x, 1)}</td>
      <td>${fmt(r.y, 1)}</td>
      <td>${fmt(r.R)}</td>
      <td>${fmt(r.theta)}</td>
      <td>${fmt(r.alpha1)}</td>
      <td>${fmt(r.alpha2)}</td>
      <td>${fmt(r.alpha)}</td>
      <td>${fmt(r.beta)}</td>
      <td>${fmt(r.A, 1)}</td>
      <td>${fmt(r.C, 1)}</td>
      <td>${fmt(r.B, 1)}</td>
      <td>${fmt(r.D, 1)}</td>
    </tr>
  `).join('');
}

// --- Magnifier ---
// Re-renders the β field at MAG_ZOOM into the lens, centered on the cursor's
// world coordinates. Adds crosshairs at the lens center (= cursor) and
// shows a small (x, y, β) readout next to the lens.
function drawMagnifier(cursorCanvasX, cursorCanvasY) {
  if (!betaView) return;
  const { A, B, grid, maxR, eA, eB, ppm, PAD, pw, ph } = betaView;

  // Cursor in world coordinates
  const wxCursor = (cursorCanvasX - PAD.l) / pw * (2 * maxR) + (-maxR);
  const wyCursor = maxR - (cursorCanvasY - PAD.t) / ph * (2 * maxR);

  // Lens dimensions
  const LENS = 220;
  const ZOOM = 4;

  // Position lens near cursor but keep it on-screen
  let lx = cursorCanvasX + 24;
  let ly = cursorCanvasY - LENS - 24;
  if (lx + LENS + 90 > betaCanvas.width) lx = cursorCanvasX - LENS - 24;
  if (ly < 4) ly = cursorCanvasY + 24;
  if (lx < 4) lx = 4;
  if (ly + LENS > betaCanvas.height) ly = betaCanvas.height - LENS - 4;

  // Lens frame
  bc.save();
  bc.beginPath();
  bc.rect(lx, ly, LENS, LENS);
  bc.fillStyle = '#0e1320';
  bc.fill();
  bc.strokeStyle = '#aac4ff';
  bc.lineWidth = 1.5;
  bc.stroke();

  // Clip to lens, then re-render the β field with a zoomed mapping
  // centered on the cursor world coordinates.
  bc.beginPath(); bc.rect(lx, ly, LENS, LENS); bc.clip();

  const ppmZ = ppm * ZOOM;          // pixels per mm inside the lens
  const halfMM = (LENS / 2) / ppmZ; // world-mm visible from center to edge

  // Mapping: world (gx, gy) → lens canvas pixels
  const wxL = gx => lx + LENS / 2 + (gx - wxCursor) * ppmZ;
  const wyL = gy => ly + LENS / 2 - (gy - wyCursor) * ppmZ;

  // Light grid lines inside the lens for orientation
  bc.strokeStyle = 'rgba(170,196,255,0.08)';
  bc.lineWidth = 1;
  const gxStart = Math.ceil((wxCursor - halfMM) / grid) * grid;
  const gxEnd   = Math.floor((wxCursor + halfMM) / grid) * grid;
  const gyStart = Math.ceil((wyCursor - halfMM) / grid) * grid;
  const gyEnd   = Math.floor((wyCursor + halfMM) / grid) * grid;
  for (let g = gxStart; g <= gxEnd + 1e-9; g += grid) {
    const px = wxL(g);
    bc.beginPath(); bc.moveTo(px, ly); bc.lineTo(px, ly + LENS); bc.stroke();
  }
  for (let g = gyStart; g <= gyEnd + 1e-9; g += grid) {
    const py = wyL(g);
    bc.beginPath(); bc.moveTo(lx, py); bc.lineTo(lx + LENS, py); bc.stroke();
  }

  // Re-render the β ellipses at zoomed scale, only those inside the lens
  renderBetaField(bc, {
    A, B, grid, maxR, eA, eB, wx: wxL, wy: wyL, ppm: ppmZ,
    drawAxesAndCircle: false,
    plotRect: { x: lx, y: ly, w: LENS, h: LENS }
  });

  // Crosshair at lens center (= cursor location in world)
  bc.strokeStyle = 'rgba(255,255,255,0.55)';
  bc.lineWidth = 1;
  bc.beginPath();
  bc.moveTo(lx + LENS / 2 - 8, ly + LENS / 2);
  bc.lineTo(lx + LENS / 2 + 8, ly + LENS / 2);
  bc.moveTo(lx + LENS / 2, ly + LENS / 2 - 8);
  bc.lineTo(lx + LENS / 2, ly + LENS / 2 + 8);
  bc.stroke();

  bc.restore();

  // Readout (x, y, β) just outside the lens
  const r = computeAngles(wxCursor, wyCursor, A, B);
  const betaDeg = r.invalid || r.beta === null ? null : r.beta * RAD2DEG;
  const lines = [
    `x = ${wxCursor.toFixed(2)} mm`,
    `y = ${wyCursor.toFixed(2)} mm`,
    `β = ${betaDeg === null ? '—' : betaDeg.toFixed(2) + '°'}`
  ];
  bc.save();
  bc.font = '11px Segoe UI';
  bc.textBaseline = 'top';
  const tw = 110, th = 14 * lines.length + 8;
  let tx = lx + LENS + 6;
  let ty = ly;
  if (tx + tw > betaCanvas.width) tx = lx - tw - 6;
  bc.fillStyle = 'rgba(14,19,32,0.9)';
  bc.strokeStyle = '#aac4ff';
  bc.lineWidth = 1;
  bc.fillRect(tx, ty, tw, th);
  bc.strokeRect(tx, ty, tw, th);
  bc.fillStyle = '#dbe6ff';
  lines.forEach((s, i) => bc.fillText(s, tx + 6, ty + 4 + i * 14));
  bc.restore();
}

// Mouse handling on the β plot for the magnifier
let magnifierActive = false;
betaCanvas.addEventListener('mousemove', e => {
  if (!betaView) return;
  const rect = betaCanvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (betaCanvas.width / rect.width);
  const cy = (e.clientY - rect.top) * (betaCanvas.height / rect.height);

  // Only show magnifier when cursor is inside the plot area
  const { PAD, pw, ph } = betaView;
  if (cx < PAD.l || cx > PAD.l + pw || cy < PAD.t || cy > PAD.t + ph) {
    if (magnifierActive) { magnifierActive = false; drawBeta(); }
    return;
  }
  magnifierActive = true;
  drawBeta();
  drawMagnifier(cx, cy);
});
betaCanvas.addEventListener('mouseleave', () => {
  if (magnifierActive) { magnifierActive = false; drawBeta(); }
});

// --- Master redraw ---
function redrawAll() {
  drawBeta();
  drawAlpha();
  buildTable();
}

// Wire up inputs
['inA', 'inB', 'inGrid', 'inRadius', 'inEA', 'inEB'].forEach(id => {
  document.getElementById(id).addEventListener('input', redrawAll);
});

redrawAll();
</script>
